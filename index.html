<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Green by Brahim</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f9f4;
    }

    header {
      background-color: #2e7d32;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: #1b5e20;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }

    .hero {
      padding: 60px;
      text-align: center;
      background: url('https://images.unsplash.com/photo-1501004318641-b39e6451bec6') no-repeat center;
      background-size: cover;
      color: white;
    }

    .section {
      padding: 40px;
      text-align: center;
    }

    .products {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      background: #2e7d32;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
      border-radius: 5px;
    }

    footer {
      background: #1b5e20;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 30px;
    }
  </style>
</head>
<body>

<header>
  <h1>Green by Brahim</h1>
  <p>Your Trusted Plant Nursery</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Plants</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</nav>

<section class="hero">
  <h2>Bring Nature Closer to You 🌿</h2>
</section>

<section class="section">
  <h2>Our Popular Plants</h2>
  <div class="products">
    
    <div class="card">
      <img src="https://images.unsplash.com/photo-1593691509543-c55fb32b1a8b">
      <h3>Indoor Plant</h3>
      <p>$15</p>
      <button>Order Now</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1524593119773-9f5d2d98b1d3">
      <h3>Outdoor Plant</h3>
      <p>$20</p>
      <button>Order Now</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1509062522246-3755977927d7">
      <h3>Fruit Tree</h3>
      <p>$45</p>
      <button>Order Now</button>
    </div>

  </div>
</section>

<footer>
  <p>© 2026 Green by Brahim | All Rights Reserved</p>
</footer>

</body>
</html>
